<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Novedades Bibliográficas</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #F4EFE6;
    --card:     #FDFAF5;
    --ink:      #1A1A1A;
    --forest:   #1E3A2F;
    --gold:     #A0732A;
    --muted:    #7A6E65;
    --border:   #DDD5C4;
    --shadow:   0 2px 20px rgba(30,58,47,.08);
    --hover:    0 8px 40px rgba(30,58,47,.16);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--ink); font-family: 'Outfit', sans-serif; min-height: 100vh; }

  /* ── HEADER ── */
  header {
    background: var(--forest);
    padding: 0 2.5rem;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 24px rgba(0,0,0,.2);
  }
  .header-inner {
    max-width: 1300px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
  }
  .brand { display: flex; align-items: center; gap: 14px; }
  .brand-icon {
    width: 38px; height: 38px; background: var(--gold);
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
    font-size: 19px; flex-shrink: 0;
  }
  .brand-name { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; color: #F4EFE6; font-weight: 600; letter-spacing: .3px; }
  .brand-sub  { font-size: .65rem; color: rgba(244,239,230,.5); letter-spacing: 2px; text-transform: uppercase; margin-top: 1px; }
  .btn-csv {
    background: rgba(244,239,230,.1); border: 1px solid rgba(244,239,230,.25);
    color: #F4EFE6; padding: .45rem 1.1rem; border-radius: 6px;
    font-family: 'Outfit', sans-serif; font-size: .8rem; cursor: pointer;
    transition: background .2s; display: flex; align-items: center; gap: 6px;
  }
  .btn-csv:hover { background: rgba(244,239,230,.18); }

  /* ── HERO ── */
  .hero {
    background: var(--forest);
    padding: 2.5rem 2.5rem 3.5rem;
    position: relative; overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute; right: -80px; top: -80px;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(160,115,42,.18) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-inner { max-width: 1300px; margin: 0 auto; position: relative; z-index: 1; }
  .hero-chip {
    display: inline-block; background: var(--gold); color: #fff;
    font-size: .65rem; font-weight: 500; letter-spacing: 2.5px; text-transform: uppercase;
    padding: .28rem .8rem; border-radius: 3px; margin-bottom: .9rem;
  }
  .hero h1 {
    font-family: 'Cormorant Garamond', serif; font-size: clamp(2rem, 5vw, 3.2rem);
    color: #F4EFE6; font-weight: 600; line-height: 1.15; max-width: 560px;
    margin-bottom: .7rem;
  }
  .hero p { color: rgba(244,239,230,.6); font-size: .9rem; font-weight: 300; max-width: 440px; line-height: 1.65; }
  .hero-stats { display: flex; gap: 2.5rem; margin-top: 1.8rem; }
  .stat { color: rgba(244,239,230,.5); font-size: .75rem; font-weight: 300; }
  .stat strong { display: block; font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; color: var(--gold); font-weight: 600; line-height: 1; }

  /* ── TOOLBAR ── */
  .toolbar {
    max-width: 1300px; margin: 0 auto;
    padding: 1.5rem 2.5rem;
    display: flex; gap: 1rem; align-items: center; flex-wrap: wrap;
  }
  .search-wrap { position: relative; flex: 1; min-width: 240px; }
  .search-wrap svg { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--muted); }
  #searchInput {
    width: 100%; padding: .65rem 1rem .65rem 2.6rem;
    border: 1.5px solid var(--border); border-radius: 8px;
    background: var(--card); font-family: 'Outfit', sans-serif; font-size: .875rem;
    outline: none; color: var(--ink); transition: border-color .2s;
  }
  #searchInput:focus { border-color: var(--gold); }
  .filter-select {
    padding: .65rem 1rem; border: 1.5px solid var(--border); border-radius: 8px;
    background: var(--card); font-family: 'Outfit', sans-serif; font-size: .85rem;
    outline: none; cursor: pointer; color: var(--ink);
  }
  .filter-select:focus { border-color: var(--gold); }
  .count { font-size: .78rem; color: var(--muted); margin-left: auto; white-space: nowrap; }

  /* ── GRID ── */
  .grid-wrap { max-width: 1300px; margin: 0 auto; padding: 0 2.5rem 5rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(195px, 1fr)); gap: 1.5rem; }

  .card {
    background: var(--card); border-radius: 10px; overflow: hidden;
    box-shadow: var(--shadow); cursor: pointer;
    transition: transform .25s ease, box-shadow .25s ease;
    animation: rise .4s ease both; display: flex; flex-direction: column;
  }
  @keyframes rise { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:none; } }
  .card:hover { transform: translateY(-5px); box-shadow: var(--hover); }

  .card-cover {
    width: 100%; aspect-ratio: 2/3;
    background: linear-gradient(150deg, #2D4A3E, #152B22);
    display: flex; align-items: center; justify-content: center; overflow: hidden;
  }
  .card-cover img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .no-cover {
    padding: 1.2rem; text-align: center;
    font-family: 'Cormorant Garamond', serif; color: rgba(244,239,230,.4);
    font-size: .8rem; line-height: 1.5; font-style: italic;
  }
  .no-cover span { font-size: 2.8rem; opacity: .3; display: block; margin-bottom: .5rem; }

  .card-body { padding: .9rem 1rem 1rem; flex: 1; display: flex; flex-direction: column; }
  .card-title {
    font-family: 'Cormorant Garamond', serif; font-size: .95rem; font-weight: 600;
    line-height: 1.3; color: var(--ink);
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
  }
  .card-author { font-size: .72rem; color: var(--muted); margin-top: .3rem; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: auto; padding-top: .65rem; }
  .card-year { background: var(--forest); color: var(--gold); font-size: .68rem; font-weight: 500; padding: .2rem .55rem; border-radius: 3px; }
  .card-ed { font-size: .65rem; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 95px; }

  /* ── MODAL ── */
  .overlay {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(8,16,12,.75); backdrop-filter: blur(5px);
    display: flex; align-items: center; justify-content: center; padding: 1.5rem;
    opacity: 0; pointer-events: none; transition: opacity .3s;
  }
  .overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--card); border-radius: 14px; max-width: 800px; width: 100%;
    max-height: 88vh; overflow-y: auto; scrollbar-width: thin;
    box-shadow: 0 30px 80px rgba(0,0,0,.4);
    transform: scale(.95); transition: transform .3s; position: relative;
  }
  .overlay.open .modal { transform: scale(1); }
  .modal-grid { display: grid; grid-template-columns: 210px 1fr; min-height: 380px; }
  @media(max-width:580px) { .modal-grid { grid-template-columns: 1fr; } }

  .modal-cover {
    background: linear-gradient(160deg, #1E3A2F, #0D2018);
    border-radius: 14px 0 0 14px; overflow: hidden;
    display: flex; align-items: flex-start;
  }
  .modal-cover img { width: 100%; object-fit: cover; display: block; }
  .modal-cover .no-cover { padding: 2rem; align-self: center; }

  .modal-body { padding: 2rem 2.2rem; display: flex; flex-direction: column; gap: .9rem; }
  .modal-chip {
    display: inline-flex; align-items: center; gap: .4rem;
    background: rgba(160,115,42,.12); color: var(--gold);
    font-size: .65rem; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase;
    padding: .28rem .7rem; border-radius: 3px; width: fit-content;
  }
  .modal-title { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 600; line-height: 1.2; }
  .modal-author { font-size: .9rem; color: var(--muted); }
  .modal-pills { display: flex; gap: .45rem; flex-wrap: wrap; }
  .pill { background: var(--bg); border: 1px solid var(--border); font-size: .7rem; padding: .22rem .65rem; border-radius: 20px; color: var(--muted); }
  .pill strong { color: var(--ink); }

  .resumen-box {
    background: var(--bg); border-left: 3px solid var(--gold);
    border-radius: 0 8px 8px 0; padding: 1rem 1.1rem;
  }
  .resumen-label { font-size: .65rem; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gold); margin-bottom: .4rem; }
  .resumen-text { font-size: .875rem; line-height: 1.72; color: var(--ink); }
  .resumen-empty { font-size: .85rem; color: var(--muted); font-style: italic; }

  .modal-isbn { font-size: .7rem; color: var(--muted); margin-top: auto; padding-top: .6rem; border-top: 1px solid var(--border); }
  .modal-close {
    position: absolute; top: .9rem; right: .9rem;
    width: 30px; height: 30px; background: rgba(0,0,0,.1); border: none;
    border-radius: 50%; font-size: .9rem; cursor: pointer; color: var(--ink);
    display: flex; align-items: center; justify-content: center; z-index: 10;
  }

  /* ── IMPORT PANEL ── */
  .import-panel {
    position: fixed; inset: 0; z-index: 2000;
    background: rgba(8,16,12,.8); backdrop-filter: blur(5px);
    display: flex; align-items: center; justify-content: center; padding: 1.5rem;
    opacity: 0; pointer-events: none; transition: opacity .3s;
  }
  .import-panel.open { opacity: 1; pointer-events: all; }
  .import-box {
    background: var(--card); border-radius: 14px; max-width: 600px; width: 100%;
    padding: 2.2rem; box-shadow: 0 24px 60px rgba(0,0,0,.3);
  }
  .import-box h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; margin-bottom: .5rem; }
  .import-box p { font-size: .85rem; color: var(--muted); line-height: 1.65; margin-bottom: 1.1rem; }
  .import-box code { background: var(--bg); padding: .15rem .4rem; border-radius: 3px; font-size: .78rem; color: var(--forest); }
  .import-box textarea {
    width: 100%; height: 160px; border: 1.5px solid var(--border); border-radius: 8px;
    padding: .8rem; font-family: monospace; font-size: .78rem; resize: vertical; outline: none;
    background: var(--bg);
  }
  .import-box textarea:focus { border-color: var(--gold); }
  .import-actions { display: flex; gap: .75rem; margin-top: 1.1rem; justify-content: flex-end; }
  .btn-primary {
    background: var(--forest); color: #F4EFE6; border: none;
    padding: .6rem 1.3rem; border-radius: 7px; font-family: 'Outfit', sans-serif;
    font-size: .875rem; cursor: pointer; transition: opacity .2s;
  }
  .btn-primary:hover { opacity: .85; }
  .btn-ghost {
    background: transparent; border: 1.5px solid var(--border); color: var(--ink);
    padding: .6rem 1.3rem; border-radius: 7px; font-family: 'Outfit', sans-serif;
    font-size: .875rem; cursor: pointer;
  }
  .no-results { text-align: center; padding: 5rem 2rem; color: var(--muted); font-style: italic; }

  /* FILE input hidden */
  #fileInput { display: none; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="brand">
      <div class="brand-icon">📚</div>
      <div>
        <div class="brand-name">Biblioteca</div>
        <div class="brand-sub">Novedades Bibliográficas</div>
      </div>
    </div>
    <button class="btn-csv" onclick="document.getElementById('fileInput').click()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Importar CSV
    </button>
    <input type="file" id="fileInput" accept=".csv" onchange="importCSV(event)">
  </div>
</header>

<div class="hero">
  <div class="hero-inner">
    <span class="hero-chip">✦ Nuevas adquisiciones</span>
    <h1>Catálogo de Novedades</h1>
    <p>Explorá las últimas incorporaciones al acervo de la biblioteca.</p>
    <div class="hero-stats">
      <div class="stat"><strong id="totalCount">0</strong>Títulos</div>
      <div class="stat"><strong id="yearRange">—</strong>Rango años</div>
      <div class="stat"><strong id="withCover">0</strong>Con portada</div>
    </div>
  </div>
</div>

<div class="toolbar">
  <div class="search-wrap">
    <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="Buscar por título, autor o editorial…" oninput="renderGrid()">
  </div>
  <select class="filter-select" id="editFilter" onchange="renderGrid()">
    <option value="">Todas las editoriales</option>
  </select>
  <select class="filter-select" id="yearFilter" onchange="renderGrid()">
    <option value="">Todos los años</option>
  </select>
  <select class="filter-select" id="coverFilter" onchange="renderGrid()">
    <option value="">Todos</option>
    <option value="con">Con portada</option>
    <option value="sin">Sin portada</option>
  </select>
  <span class="count" id="countLabel"></span>
</div>

<div class="grid-wrap">
  <div class="grid" id="grid"></div>
  <div class="no-results" id="noResults" style="display:none">No se encontraron títulos con esos filtros.</div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal(null,true)">✕</button>
    <div class="modal-grid">
      <div class="modal-cover" id="mCover"></div>
      <div class="modal-body">
        <div class="modal-chip">📖 Nueva Adquisición</div>
        <div class="modal-title"  id="mTitle"></div>
        <div class="modal-author" id="mAuthor"></div>
        <div class="modal-pills" id="mPills"></div>
        <div class="resumen-box">
          <div class="resumen-label">Resumen</div>
          <div id="mResumen"></div>
        </div>
        <div class="modal-isbn" id="mIsbn"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ── DATOS ─────────────────────────────────────────────────────
// Columnas esperadas en el CSV: Titulo, ISBN, Autor, Editorial, Año, Portada, Resumen
let books = [
  {Titulo:"An Introduction to Measure Theory",ISBN:"9781470466404",Autor:"Terence Tao",Editorial:"AMS",Año:2011,Resumen:"Introducción rigurosa a la teoría de la medida escrita por el Premio Fields Terence Tao. Cubre la integración de Lebesgue, los espacios L^p y los principales teoremas de convergencia con un enfoque pedagógico excepcional. Texto de referencia en cursos de análisis matemático avanzado a nivel de posgrado."},
  {Titulo:"Diophantine Geometry",ISBN:"9781014519641",Autor:"Lang, S.",Editorial:"Hassell Street Press",Año:1962,Resumen:"Obra clásica de Serge Lang que establece los fundamentos de la geometría diofántica moderna. Estudia las soluciones enteras y racionales de ecuaciones polinomiales mediante herramientas de geometría algebraica y teoría de números. Referencia fundamental para investigadores en teoría de números algebraica."},
  {Titulo:"Precálculo",ISBN:"9786075265469",Autor:"Swokowski",Editorial:"Cengage",Año:2018,Resumen:"Texto introductorio que prepara al estudiante para el cálculo diferencial e integral. Abarca funciones, trigonometría, álgebra y geometría analítica con numerosos ejemplos y ejercicios resueltos. Ampliamente utilizado en cursos de nivelación matemática universitaria."},
  {Titulo:"Introducción al Análisis Funcional",ISBN:"9788429151893",Autor:"Gatica",Editorial:"Reverte",Año:2014,Resumen:"Texto en español que introduce los conceptos fundamentales del análisis funcional, incluyendo espacios de Banach, espacios de Hilbert y operadores lineales acotados. Combina rigor matemático con claridad expositiva, ideal para estudiantes de matemáticas y física matemática de posgrado."},
  {Titulo:"Estadística para Administración y Economía",ISBN:"9788483224038",Autor:"Newbold",Editorial:"Pearson",Año:2008,Resumen:"Manual de estadística orientado a estudiantes de ciencias económicas y empresariales. Cubre estadística descriptiva, probabilidad, inferencia y regresión con aplicaciones prácticas al mundo de los negocios. Reconocido por su enfoque aplicado y abundancia de casos reales."},
  {Titulo:"La investigación-acción en la escuela",ISBN:"9788471123411",Autor:"Elliot",Editorial:"Morata",Año:2000,Resumen:"John Elliott presenta la investigación-acción como metodología para la mejora de la práctica docente. El libro fundamenta cómo los profesores pueden convertirse en investigadores de su propia aula. Referencia clásica en la formación docente y la educación reflexiva."},
  {Titulo:"Estrategias docentes",ISBN:"9786071601223",Autor:"Eggen",Editorial:"FCE",Año:2010,Resumen:"Obra dedicada al estudio de las estrategias de enseñanza y su impacto en el aprendizaje escolar. Analiza metodologías activas, el aprendizaje cooperativo y el pensamiento crítico en el aula. Muy utilizado en programas de formación inicial y continua del profesorado."},
  {Titulo:"La escuela inteligente",ISBN:"9788474325607",Autor:"Perkins",Editorial:"Gedisa",Año:2008,Resumen:"David Perkins propone un modelo de escuela centrado en el desarrollo del pensamiento y la comprensión profunda. Critica la memorización mecánica y defiende una educación que enseñe a pensar con y sobre el conocimiento. Influyente en las corrientes de enseñanza para la comprensión."},
  {Titulo:"Measure Theory. Vol. 1",ISBN:"9783540345145",Autor:"Bogachev, V.",Editorial:"Springer",Año:2007,Resumen:"Tratado enciclopédico sobre teoría de la medida escrito por Vladimir Bogachev. Cubre las bases de la medida de Lebesgue, medidas abstractas y teoremas de convergencia con exhaustividad excepcional. Referencia indispensable para investigadores en análisis matemático y probabilidad."},
  {Titulo:"Functions of One Complex Variable I",ISBN:"9781461263135",Autor:"Conway, J.",Editorial:"Springer",Año:1978,Resumen:"Texto clásico de análisis complejo de una variable, reconocido por su rigor y claridad. Cubre funciones analíticas, el teorema de Cauchy y series de Laurent. Ampliamente utilizado en cursos de posgrado de matemáticas en todo el mundo."},
  {Titulo:"A Course in Functional Analysis",ISBN:"9781475743838",Autor:"Conway, J.",Editorial:"Springer",Año:2007,Resumen:"Curso completo de análisis funcional que cubre espacios de Hilbert y Banach, teoría espectral y el teorema de Hahn-Banach. Escrito por John B. Conway con un estilo claro y motivado por ejemplos concretos. Uno de los textos de posgrado más utilizados en esta área."},
  {Titulo:"Integration and Probability",ISBN:"9781461242024",Autor:"Malliavin, P.",Editorial:"Springer",Año:1995,Resumen:"Paul Malliavin presenta la teoría de la integración y sus conexiones profundas con la probabilidad moderna. Abarca integración de Lebesgue, espacios L^p y cálculo de Malliavin. Referencia para matemáticos interesados en el análisis estocástico."},
  {Titulo:"The Theory of Sets and Transfinite Arithmetic",ISBN:"Sin ISBN",Autor:"Abian, Alexander",Editorial:"W.B. Saunders Co.",Año:1965,Resumen:"Obra de Alexander Abian que desarrolla la teoría de conjuntos y la aritmética transfinita desde los axiomas de Zermelo-Fraenkel. Introduce los números ordinales y cardinales con notable claridad y rigor. Texto de valor histórico para quienes estudian los fundamentos de las matemáticas."},
  {Titulo:"Complex Analysis (Undergraduate Texts in Mathematics)",ISBN:"9780387950693",Autor:"Theodore W. Gamelin",Editorial:"Springer",Año:2001,Resumen:"Introducción accesible al análisis complejo dirigida a estudiantes de pregrado avanzado. Cubre funciones analíticas, integración compleja, series de Laurent y teoría de residuos con abundantes ejemplos. Destaca por equilibrar rigor matemático con claridad pedagógica."},
  {Titulo:"Problems in Algebraic Number Theory",ISBN:"9781441919670",Autor:"R. Murty & J. Esmonde",Editorial:"Springer-Verlag",Año:2004,Resumen:"Colección de problemas que cubre los temas centrales de la teoría algebraica de números, incluyendo cuerpos de números, anillos de enteros y reciprocidad cuadrática. Diseñado para desarrollar habilidades de demostración en estudiantes de posgrado. Excelente complemento a textos teóricos del área."},
  {Titulo:"Plane Answers to Complex Questions: The Theory of Linear Models",ISBN:"9781461428855",Autor:"Christensen, R.",Editorial:"Springer",Año:2010,Resumen:"Texto avanzado sobre modelos lineales estadísticos que utiliza la geometría del espacio vectorial como hilo conductor. Cubre regresión, análisis de varianza y modelos mixtos con gran profundidad teórica. Recomendado para estadísticos que buscan una comprensión rigurosa de los modelos lineales."},
  {Titulo:"An Introduction to Homological Algebra",ISBN:"9780387245270",Autor:"J. J. Rotman",Editorial:"Springer",Año:2008,Resumen:"Introducción moderna y completa al álgebra homológica, cubriendo funtores derivados, sucesiones espectrales y cohomología de grupos. Joseph Rotman es reconocido por su estilo accesible y motivaciones geométricas. Texto estándar para posgrado en álgebra moderna."},
  {Titulo:"Fourier Analysis: An Introduction",ISBN:"9780691113845",Autor:"Stein, Elias M.",Editorial:"Princeton University Press",Año:2003,Resumen:"Primer volumen de las célebres Princeton Lectures in Analysis de Elias Stein y Rami Shakarchi. Desarrolla la teoría de Fourier desde sus fundamentos hasta sus aplicaciones al análisis real y complejo. Reconocido como uno de los textos de análisis más elegantes del siglo XXI."},
  {Titulo:"Complex Analysis (Princeton Lectures in Analysis, No. 2)",ISBN:"9780691113852",Autor:"Stein, Elias M.",Editorial:"Princeton University Press",Año:2003,Resumen:"Segundo volumen de las Princeton Lectures in Analysis, dedicado al análisis complejo. Cubre funciones holomorfas, el teorema de Cauchy, la teoría de Riemann y funciones especiales con elegancia. Junto al primer volumen, forma uno de los mejores cursos de análisis disponibles."},
  {Titulo:"Análisis Complejo y Ecuaciones Diferenciales",ISBN:"9788415581000",Autor:"Barreira",Editorial:"Delta",Año:2012,Resumen:"Texto en español que combina el análisis de funciones de variable compleja con la teoría de ecuaciones diferenciales. Integra herramientas del análisis complejo en el estudio de soluciones de EDO en el plano complejo. Dirigido a estudiantes de matemáticas y física de nivel avanzado."},

// ── ISBN & AMAZON ────────────────────────────────────────────
// Convierte ISBN-13 a ISBN-10 (igual que hace KOHA)
function isbn13to10(isbn13) {
  isbn13 = (isbn13 || '').replace(/[^0-9]/g, '');
  if (isbn13.length !== 13 || !isbn13.startsWith('978')) return null;
  const core = isbn13.slice(3, 12);
  let total = 0;
  for (let i = 0; i < 9; i++) total += (10 - i) * parseInt(core[i]);
  const check = (11 - (total % 11)) % 11;
  return core + (check === 10 ? 'X' : String(check));
}

// URL de portada de Amazon a partir del ISBN-13 (mismo método que KOHA)
function amazonCover(isbn13) {
  const isbn10 = isbn13to10(isbn13);
  if (!isbn10) return null;
  return `https://images-na.ssl-images-amazon.com/images/P/${isbn10}.01.LZZZZZZZ.jpg`;
}

// URL de página de Amazon
function amazonLink(isbn13) {
  const isbn10 = isbn13to10(isbn13);
  if (!isbn10) return null;
  return `https://www.amazon.com/dp/${isbn10}`;
}

// ── GOOGLE SHEETS ────────────────────────────────────────────
const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSWctXMgYWTRMKBDgSyTdGmeBIvASaHhBTprBwUFvZplZK3pXBXH2EyRyOeWlQtPA/pub?gid=1480362879&single=true&output=csv';

async function loadFromSheet() {
  const banner = document.getElementById('loadBanner');
  try {
    if (banner) banner.style.display = 'flex';
    const res = await fetch(SHEET_CSV_URL);
    if (!res.ok) throw new Error('Error al cargar');
    const text = await res.text();
    const lines = text.split('\n').filter(l => l.trim());
    if (lines.length < 2) throw new Error('Planilla vacía');
    const headers = parseCSVLine(lines[0]).map(h => h.trim());
    const ix = {
      T: headers.findIndex(h => /titulo/i.test(h)),
      I: headers.findIndex(h => /isbn/i.test(h)),
      A: headers.findIndex(h => /autor/i.test(h)),
      E: headers.findIndex(h => /editorial/i.test(h)),
      Y: headers.findIndex(h => /a[ñn]o/i.test(h)),
      P: headers.findIndex(h => /portada|url/i.test(h)),
      R: headers.findIndex(h => /resumen/i.test(h)),
    };
    const loaded = [];
    for (let i = 1; i < lines.length; i++) {
      const c = parseCSVLine(lines[i]);
      const b = {
        Titulo:    (c[ix.T] || '').trim(),
        ISBN:      (c[ix.I] || 'Sin ISBN').trim(),
        Autor:     (c[ix.A] || '').trim(),
        Editorial: (c[ix.E] || '').trim(),
        Año:       parseInt(c[ix.Y]) || null,
        Portada:   ix.P >= 0 ? (c[ix.P] || '').trim() : '',
        Resumen:   ix.R >= 0 ? (c[ix.R] || '').trim() : '',
      };
      if (b.Titulo) loaded.push(b);
    }
    if (loaded.length > 0) {
      books = loaded;
      console.log('✓ ' + loaded.length + ' libros cargados desde Google Sheets');
    }
  } catch(e) {
    console.warn('Usando datos locales:', e.message);
  } finally {
    if (banner) banner.style.display = 'none';
    updateStats(); populateFilters(); renderGrid();
  }
}

function init() {
  loadFromSheet();
}

function updateStats() {
  const years = books.map(b => b.Año).filter(Boolean);
  document.getElementById('totalCount').textContent = books.length;
  document.getElementById('yearRange').textContent  = years.length ? Math.min(...years) + '–' + Math.max(...years) : '—';
  document.getElementById('withCover').textContent  = books.filter(b => b.ISBN && b.ISBN !== 'Sin ISBN').length;
}

function populateFilters() {
  const eS = document.getElementById('editFilter');
  const yS = document.getElementById('yearFilter');
  while (eS.options.length > 1) eS.remove(1);
  while (yS.options.length > 1) yS.remove(1);
  [...new Set(books.map(b => b.Editorial?.trim()).filter(Boolean))].sort().forEach(e => {
    const o = document.createElement('option'); o.value = e; o.textContent = e; eS.appendChild(o);
  });
  [...new Set(books.map(b => b.Año).filter(Boolean))].sort((a,b) => b-a).forEach(y => {
    const o = document.createElement('option'); o.value = y; o.textContent = y; yS.appendChild(o);
  });
}

// ── GRID ──────────────────────────────────────────────────────
function renderGrid() {
  const q  = document.getElementById('searchInput').value.toLowerCase();
  const eF = document.getElementById('editFilter').value;
  const yF = document.getElementById('yearFilter').value;
  const cF = document.getElementById('coverFilter').value;

  const filtered = books.filter(b => {
    const mQ = !q || [b.Titulo, b.Autor, b.Editorial].some(f => f?.toLowerCase().includes(q));
    const mE = !eF || b.Editorial?.trim() === eF;
    const mY = !yF || String(b.Año) === yF;
    const mC = !cF || (cF === 'con' ? !!b.Portada : !b.Portada);
    return mQ && mE && mY && mC;
  });

  document.getElementById('countLabel').textContent = `${filtered.length} título${filtered.length !== 1 ? 's' : ''}`;
  document.getElementById('noResults').style.display = filtered.length ? 'none' : 'block';
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  filtered.forEach((book, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = (i * 28) + 'ms';
    card.onclick = () => openModal(book);
    const hasISBN_ = book.ISBN && book.ISBN !== 'Sin ISBN';
    const coverUrl_ = hasISBN_ ? amazonCover(book.ISBN) : null;
    const shopUrl_  = hasISBN_ ? amazonLink(book.ISBN)  : null;
    card.innerHTML = `
      <div class="card-cover">
        ${coverUrl_
          ? `<a href="${shopUrl_}" target="_blank" rel="noopener" onclick="event.stopPropagation()" title="Ver en Amazon">
               <img src="${coverUrl_}" alt="Portada" loading="lazy" onerror="this.parentElement.outerHTML='<div class=no-cover><span>📖</span></div>'">
             </a>`
          : `<div class="no-cover"><span>📖</span>${esc(book.Titulo)}</div>`}
      </div>
      <div class="card-body">
        <div class="card-title">${esc(book.Titulo)}</div>
        <div class="card-author">${esc(book.Autor)}</div>
        <div class="card-footer">
          <span class="card-year">${book.Año || '—'}</span>
          <span class="card-ed">${esc(book.Editorial)}</span>
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

// ── MODAL ─────────────────────────────────────────────────────
function openModal(book) {
  const hasISBN = book.ISBN && book.ISBN !== 'Sin ISBN';
  const mCoverUrl = hasISBN ? amazonCover(book.ISBN) : null;
  const mShopUrl  = hasISBN ? amazonLink(book.ISBN)  : null;
  document.getElementById('mCover').innerHTML = mCoverUrl
    ? `<a href="${mShopUrl}" target="_blank" rel="noopener" title="Ver en Amazon" style="display:block">
         <img src="${mCoverUrl}" alt="Portada" onerror="this.parentElement.outerHTML='<div class=no-cover style=padding:2rem><span>📖</span></div>'">
       </a>`
    : `<div class="no-cover" style="padding:2rem;align-self:center"><span>📖</span>${esc(book.Titulo)}</div>`;
  document.getElementById('mTitle').textContent  = book.Titulo;
  document.getElementById('mAuthor').textContent = book.Autor;
  document.getElementById('mPills').innerHTML = `
    <span class="pill"><strong>Año:</strong> ${book.Año || '—'}</span>
    <span class="pill"><strong>Editorial:</strong> ${esc(book.Editorial)}</span>
    ${hasISBN ? `<span class="pill"><strong>ISBN:</strong> ${book.ISBN}</span>` : ''}
    ${mShopUrl ? `<a href="${mShopUrl}" target="_blank" rel="noopener" class="pill" style="color:var(--gold);text-decoration:none;border-color:rgba(160,115,42,.4)">🛒 Ver en Amazon</a>` : ''}`;
  document.getElementById('mResumen').innerHTML = book.Resumen
    ? `<p class="resumen-text">${esc(book.Resumen)}</p>`
    : `<p class="resumen-empty">Sin resumen disponible. Podés agregar uno en la planilla.</p>`;
  document.getElementById('mIsbn').textContent = hasISBN ? `ISBN: ${book.ISBN}` : 'Sin ISBN registrado';
  document.getElementById('overlay').classList.add('open');
}

function closeModal(event, force = false) {
  if (force || event?.target === document.getElementById('overlay'))
    document.getElementById('overlay').classList.remove('open');
}

// ── IMPORTAR CSV ──────────────────────────────────────────────
function importCSV(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const text = e.target.result;
    const lines = text.split('\n').filter(l => l.trim());
    if (lines.length < 2) { alert('El CSV está vacío o tiene formato incorrecto.'); return; }

    const headers = parseCSVLine(lines[0]).map(h => h.trim());
    const idx = {
      T: headers.findIndex(h => /titulo/i.test(h)),
      I: headers.findIndex(h => /isbn/i.test(h)),
      A: headers.findIndex(h => /autor/i.test(h)),
      E: headers.findIndex(h => /editorial/i.test(h)),
      Y: headers.findIndex(h => /a[ñn]o/i.test(h)),
      P: headers.findIndex(h => /portada/i.test(h)),
      R: headers.findIndex(h => /resumen/i.test(h)),
    };

    let added = 0, updated = 0;
    for (let i = 1; i < lines.length; i++) {
      const c = parseCSVLine(lines[i]);
      const nb = {
        Titulo:    (c[idx.T] || '').trim(),
        ISBN:      (c[idx.I] || 'Sin ISBN').trim(),
        Autor:     (c[idx.A] || '').trim(),
        Editorial: (c[idx.E] || '').trim(),
        Año:       parseInt(c[idx.Y]) || null,
        Portada:   idx.P >= 0 ? (c[idx.P] || '').trim() : '',
        Resumen:   idx.R >= 0 ? (c[idx.R] || '').trim() : '',
      };
      if (!nb.Titulo) continue;
      const existing = books.findIndex(b => b.ISBN === nb.ISBN && nb.ISBN !== 'Sin ISBN');
      if (existing >= 0) {
        // Actualizar portada y resumen si se proporcionan
        if (nb.Portada) books[existing].Portada = nb.Portada;
        if (nb.Resumen) books[existing].Resumen = nb.Resumen;
        updated++;
      } else {
        books.push(nb); added++;
      }
    }

    event.target.value = '';
    updateStats(); populateFilters(); renderGrid();
    alert(`✅ Importación completada:\n• ${added} libros nuevos agregados\n• ${updated} libros actualizados`);
  };
  reader.readAsText(file, 'UTF-8');
}

// Parser CSV que maneja comillas y comas dentro de campos
function parseCSVLine(line) {
  const result = []; let cur = ''; let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { inQuotes = !inQuotes; }
    else if (ch === ',' && !inQuotes) { result.push(cur); cur = ''; }
    else { cur += ch; }
  }
  result.push(cur);
  return result.map(s => s.replace(/^"|"$/g, '').trim());
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(null, true); });
document.addEventListener('DOMContentLoaded', init);
</script>
